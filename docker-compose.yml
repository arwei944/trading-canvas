version: '3.8'

services:
  trading-canvas:
    build: .
    container_name: trading-canvas
    ports:
      - "7860:7860"
    volumes:
      - trading-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=7860
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-please-change-this-key-32-bytes!!}
      - DB_PATH=/app/data/trading-canvas.db
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-5}
    restart: unless-stopped

volumes:
  trading-data:
